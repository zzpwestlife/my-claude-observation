name: Publish

on:
  release:
    types: [created, edited]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: '--bundles appimage,deb'
            rust_target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-${{ runner.os }}
          cache-targets: false

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf librsvg2-dev libgtk-3-dev libsoup-3.0-dev

          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

          if apt-cache show libayatana-appindicator3-dev >/dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install typeshare-cli
        run: cargo install typeshare-cli --locked

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p lumo-daemon --release --target ${{ matrix.rust_target }}
          mkdir -p target/release
          cp target/${{ matrix.rust_target }}/release/lumo-daemon target/release/lumo-daemon
          chmod +x target/release/lumo-daemon

      - name: Verify daemon artifact for bundling
        shell: bash
        run: |
          set -euo pipefail
          test -f target/release/lumo-daemon
          ls -lh target/release/lumo-daemon

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }} --config src-tauri/tauri.ci.conf.json
          tagName: ${{ github.event.release.tag_name }}
          prerelease: ${{ github.event.release.prerelease }}
