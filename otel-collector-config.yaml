receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 1
    sampling_thereafter: 10
  
  prometheusremotewrite:
    endpoint: "http://192.168.107.2:8428/api/v1/write"
    timeout: 60s
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: false

service:
  telemetry:
    logs:
      level: debug
  
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheusremotewrite]
